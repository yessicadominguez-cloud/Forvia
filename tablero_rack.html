<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NC Tech MES - Tablero de Rack · Recolección</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: 'Noto Sans', sans-serif; background: #F0F4F8; color: #0B3A5B; }
  :root {
    --nc-dark: #0B3A5B; --nc-primary: #034A77; --nc-accent: #339FC6; --nc-light: #BFEDF6;
    --status-ok: #10b981; --status-warning: #f59e0b; --status-critical: #ef4444;
  }
  .nav-link.active { background-color: rgba(255,255,255,0.2); color: #BFEDF6; }
  .rack-col { flex: 1 1 0; min-width: 215px; }
  .rack-slot { border-radius: 0.6rem; }
  .rack-slot.ocupada { background: #fff; border: 1px solid var(--nc-accent); border-left: 6px solid var(--nc-accent); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .rack-slot.libre   { border: 1px dashed #cbd5e1; background: transparent; opacity: .5; }
</style>
</head>
<body>

<header class="flex items-center justify-between gap-3 px-4 h-12 bg-[#0B3A5B] border-b border-slate-700 shadow-sm flex-shrink-0">
  <img alt="NC Tech Logo" src="logo_nctech.png" class="h-8 w-auto object-contain flex-shrink-0"/>
  <div class="flex-1 min-w-0 flex items-center justify-center gap-3 overflow-hidden whitespace-nowrap">
    <span class="truncate" style="color:#BFEDF6;font-weight:700;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase">Recolección Mizusumashi</span>
    <div style="width:1px;height:22px;background:rgba(255,255,255,0.25)" class="shrink-0"></div>
    <span class="truncate" style="color:#fff;font-weight:900;font-size:0.85rem;letter-spacing:0.2em;text-transform:uppercase">Tablero de Rack</span>
  </div>
  <nav class="flex gap-1 flex-shrink-0">
    <a href="leveling_board.html" class="nav-link px-3 py-1.5 rounded text-xs font-bold text-white hover:bg-white/10 transition">LEVELING</a>
    <a href="lanzador.html" class="nav-link px-3 py-1.5 rounded text-xs font-bold text-white hover:bg-white/10 transition">LANZADOR</a>
    <a href="tablero_rack.html" class="nav-link active px-3 py-1.5 rounded text-xs font-bold text-white hover:bg-white/10 transition">RACK</a>
    <a href="batch_building_box.html" class="nav-link px-3 py-1.5 rounded text-xs font-bold text-white hover:bg-white/10 transition">BATCH BOX</a>
  </nav>
</header>

<main class="p-3" style="height:calc(100vh - 3rem)">
  <div class="flex flex-col gap-3 h-full">

    <div class="shrink-0 pb-2 border-b-2" style="border-color:var(--nc-accent)">
      <h1 class="text-xl font-black tracking-tight" style="color:var(--nc-dark)">Tablero de Rack</h1>
      <p class="text-[11px] text-slate-400 mt-0.5">
        <span id="rk-linea">—</span> · cajas esperando ser surtidas, por modelo &nbsp;·&nbsp;
        <span class="px-1 rounded border" style="border-color:var(--nc-accent)">llena</span> esperando &nbsp;·&nbsp;
        <span class="px-1 rounded border border-dashed border-slate-300">punteada</span> libre
      </p>
    </div>

    <div id="rk-cols" class="flex gap-3 overflow-x-auto flex-grow" style="min-height:0"></div>
  </div>
</main>

<script>
  function horaSeed(p) {
    const total = 7 * 60 + p * 8;
    return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
  }
  function idCajaSeed(modeloId, p) {
    return `CJ-${String(modeloId * 1000 + p).padStart(6, '0')}`;
  }
  function numSerieSeed(modeloId, p) {
    return String(1000000000 + modeloId * 1000000 + p * 137).padStart(11, '0');
  }

  // ── Datos de fallback (usados cuando el servidor no responde) ─────────────────
  window.KANBAN_RACK = {
    linea: "L-20 EM",
    modelos: [
      { modeloId: 1, noParte: "A7911-205-06", posiciones: Array.from({length: 8}, (_, i) => {
          const p = i + 1;
          return p <= 3
            ? { posicion: p, estado: 'ESPERANDO', tarjeta: { tarjetaId: `A7911-205-06-0${p}`, sebango: 'R3MF1-01', cantidad: 40, tarjetaNum: p, tarjetaTotal: 14, idCaja: idCajaSeed(1, p), numSerie: numSerieSeed(1, p), hora: horaSeed(p), lote: 1 } }
            : { posicion: p, estado: 'LIBRE', tarjeta: null };
        }) },
      { modeloId: 2, noParte: "A3289-742-01", posiciones: Array.from({length: 6}, (_, i) => {
          const p = i + 1;
          return p <= 5
            ? { posicion: p, estado: 'ESPERANDO', tarjeta: { tarjetaId: `A3289-742-01-0${p}`, sebango: 'R3MF1-02', cantidad: 32, tarjetaNum: p, tarjetaTotal: 10, idCaja: idCajaSeed(2, p), numSerie: numSerieSeed(2, p), hora: horaSeed(p), lote: 1 } }
            : { posicion: p, estado: 'LIBRE', tarjeta: null };
        }) },
      { modeloId: 3, noParte: "A9442-834-00", posiciones: Array.from({length: 6}, (_, i) => ({ posicion: i + 1, estado: 'LIBRE', tarjeta: null })) },
      { modeloId: 4, noParte: "A7460-314-06", posiciones: Array.from({length: 4}, (_, i) => {
          const p = i + 1;
          return p === 1
            ? { posicion: p, estado: 'ESPERANDO', tarjeta: { tarjetaId: `A7460-314-06-0${p}`, sebango: 'R3MF1-04', cantidad: 24, tarjetaNum: p, tarjetaTotal: 6, idCaja: idCajaSeed(4, p), numSerie: numSerieSeed(4, p), hora: horaSeed(p), lote: 1 } }
            : { posicion: p, estado: 'LIBRE', tarjeta: null };
        }) }
    ]
  };

  const RK_API_GET  = '/kanban/rack/get';
  const RK_API_POST = '/kanban/rack/post';

  async function cargarDesdeServidor() {
    try {
      const res = await fetch(RK_API_GET, { method: 'GET', headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data && typeof data === 'object') window.KANBAN_RACK = data;
    } catch (e) {
      console.warn('[TableroRack] Servidor no disponible, usando datos locales:', e.message);
    }
    render();
  }

  async function surtir(modeloId, posicion) {
    const modelo = window.KANBAN_RACK.modelos.find(m => m.modeloId === modeloId);
    const pos = modelo?.posiciones.find(p => p.posicion === posicion);
    if (pos) { pos.estado = 'LIBRE'; pos.tarjeta = null; }
    render();
    try {
      await fetch(RK_API_POST, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accion: 'surtir', modeloId, posicion, timestamp: new Date().toISOString() })
      });
    } catch (e) {
      console.warn('[TableroRack.surtir]', e.message);
    }
  }

  function slotHtml(modelo, pos) {
    if (pos.estado !== 'ESPERANDO') {
      return `
        <div class="rack-slot libre px-2 py-2 flex items-center justify-center text-[9px] font-bold text-slate-300 uppercase">
          Libre
        </div>`;
    }
    return `
      <div class="rack-slot ocupada px-2 py-2">
        <div class="flex justify-between items-center font-mono">
          <span class="text-[10px] font-black" style="color:var(--nc-primary)">${pos.tarjeta.sebango}</span>
          <span class="text-[9px] font-bold text-slate-400">${pos.tarjeta.tarjetaNum}/${pos.tarjeta.tarjetaTotal}</span>
        </div>
        <div class="flex justify-between items-center mt-1.5 font-mono">
          <span class="font-black text-[15px]" title="ID Caja">${pos.tarjeta.idCaja}</span>
          <span class="font-black text-[13px] opacity-90" title="Nº Serie">${pos.tarjeta.numSerie}</span>
        </div>
        <div class="flex justify-between items-center mt-1.5 text-[11px] font-bold opacity-80">
          <span class="flex items-center gap-0.5"><span class="material-symbols-outlined" style="font-size:12px">schedule</span>${pos.tarjeta.hora}</span>
          <span>Lote ${pos.tarjeta.lote}</span>
        </div>
        <div class="flex justify-between items-center mt-1.5">
          <span class="text-[10px] font-black" style="color:var(--nc-dark)">${pos.tarjeta.cantidad} pzs</span>
          <button onclick="surtir(${modelo.modeloId}, ${pos.posicion})"
            class="px-2 py-1 rounded text-white text-[9px] font-bold uppercase tracking-wide transition flex items-center gap-1"
            style="background:var(--nc-accent)" onmouseover="this.style.background='var(--nc-primary)'" onmouseout="this.style.background='var(--nc-accent)'">
            <span class="material-symbols-outlined text-xs">local_shipping</span>Surtir
          </button>
        </div>
      </div>`;
  }

  function render() {
    const data = window.KANBAN_RACK;
    document.getElementById('rk-linea').textContent = data.linea ?? '—';

    document.getElementById('rk-cols').innerHTML = (data.modelos ?? []).map(modelo => {
      const total = modelo.posiciones.length;
      const ocupadas = modelo.posiciones.filter(p => p.estado === 'ESPERANDO').length;
      const riesgo = ocupadas === 0 ? 'critico' : (ocupadas / total <= 0.25 ? 'warning' : 'ok');
      const pillColor = riesgo === 'critico' ? 'var(--status-critical)' : (riesgo === 'warning' ? 'var(--status-warning)' : 'var(--nc-dark)');
      const aviso = riesgo === 'critico'
        ? `<div class="flex items-center justify-center gap-1 py-3 mb-1 rounded-lg" style="background:#fef2f2;color:var(--status-critical)">
             <span class="material-symbols-outlined text-base">warning</span>
             <span class="text-[9px] font-black uppercase">Sin cajas esperando</span>
           </div>`
        : '';
      return `
        <div class="rack-col flex flex-col gap-2">
          <div class="flex justify-between items-baseline">
            <span class="font-mono font-black text-xs" style="color:var(--nc-dark)">${modelo.noParte}</span>
            <span class="text-[9px] font-black px-1.5 py-0.5 rounded-full text-white" style="background:${pillColor}">${ocupadas}/${total}</span>
          </div>
          ${aviso}
          <div class="flex flex-col gap-1.5 overflow-y-auto">
            ${[...modelo.posiciones].reverse().map(p => slotHtml(modelo, p)).join('')}
          </div>
        </div>`;
    }).join('');
  }

  render();
  setInterval(cargarDesdeServidor, 5000);
</script>

</body>
</html>
